appId: com.livescreate.scribe
productName: Scribe
copyright: MIT — local-first dictation
directories:
  output: release
files:
  - out/**
  - package.json
  - "!node_modules/**"
  - node_modules/better-sqlite3/**
  - node_modules/koffi/**
  - node_modules/uiohook-napi/**
  - node_modules/bindings/**
  - node_modules/file-uri-to-path/**
  - node_modules/node-gyp-build/**
  - node_modules/prebuild-install/**
  - node_modules/ffmpeg-static/**
asarUnpack:
  # ffmpeg is a native binary — it must live outside the asar archive so it can
  # be spawned. Used by the phone bridge to transcode mobile audio to WAV.
  - "**/ffmpeg-static/**"
extraResources:
  # CPU whisper build ships in the installer; the CUDA build is fetched on
  # first run for NVIDIA machines (keeps the installer small).
  - from: resources/whisper/cpu
    to: whisper/cpu
  - from: resources/icon-16.png
    to: icon-16.png
  - from: resources/icon-32.png
    to: icon-32.png
  - from: resources/icon-256.png
    to: icon-256.png
  - from: resources/bench-sample.wav
    to: bench-sample.wav
win:
  target:
    - nsis
  icon: resources/icon-256.png
nsis:
  # Standard Windows install/uninstall wizard (not the bare one-click window):
  # welcome page, install location, progress, finish — like most Windows apps.
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  # App data removal is handled conditionally in installer.nsh: a real
  # uninstall asks to back the data up first; updates never touch it.
  deleteAppDataOnUninstall: false
  include: build/installer.nsh
npmRebuild: false
